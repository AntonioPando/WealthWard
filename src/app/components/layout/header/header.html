<header class="main-header">
    <!-- Buscador -->
    <div class="search-container">
        <i class="search-icon">🔍</i>
        <input type="text" placeholder="Buscar transacciones, presupuestos..." class="search-input">
    </div>

    <!-- Lado derecho: Saldo y Usuario -->
    <div class="header-actions">
        <div class="balance-display">
            <span class="balance-label">SALDO TOTAL</span>
            <span class="balance-amount">$24,500.00</span>
        </div>

        <div class="action-icons">
            <button class="icon-btn" title="Notificaciones">🔔</button>
            <button class="icon-btn" title="Historial">🕒</button>
            <div class="user-profile">
                <img src="avatar.jpg" alt="Perfil" class="avatar">
            </div>
        </div>
    </div>
</header>
